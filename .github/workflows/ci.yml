name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        run: docker compose -f dev/docker-compose.yml run --rm backend echo "no-op — replace with actual lint command"

      - name: Test
        run: docker compose -f dev/docker-compose.yml run --rm backend echo "no-op — replace with actual test command"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint
        run: docker compose -f dev/docker-compose.yml run --rm frontend echo "no-op — replace with actual lint command"

      - name: Test
        run: docker compose -f dev/docker-compose.yml run --rm frontend echo "no-op — replace with actual test command"
