name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  test-backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Build
        # Replace 'backend' with your actual service name in dev/docker-compose.yml
        run: docker compose -f dev/docker-compose.yml build backend

      - name: Lint
        # --no-deps: lint does not need db/redis
        # Replace with: docker compose -f dev/docker-compose.yml run --rm --no-deps backend <your-lint-command>
        # e.g.: ruff check . && ruff format --check .
        run: echo "no-op — replace with actual lint command"

      - name: Test
        # depends_on services (db, redis) start automatically via docker compose
        # Replace with: docker compose -f dev/docker-compose.yml run --rm backend <your-test-command>
        # e.g.: coverage run manage.py test && coverage xml
        # Coverage file appears on host via bind mount — no extraction step needed
        run: echo "no-op — replace with actual test command"
        env:
          # Add CI-specific env overrides here (secrets from GitHub Actions)
          # DATABASE_URL: postgres://user:password@db:5432/myapp
          # REDIS_URL: redis://redis:6379/0
          PLACEHOLDER: "true"

      # Uncomment and configure once tests produce a coverage file:
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     files: backend/coverage.xml   # adjust path to your coverage file
      #     flags: backend
      #     fail_ci_if_error: false
      #     verbose: true

  test-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Build
        # Replace 'frontend' with your actual service name in dev/docker-compose.yml
        run: docker compose -f dev/docker-compose.yml build frontend

      - name: Lint
        # Replace with: docker compose -f dev/docker-compose.yml run --rm --no-deps frontend <your-lint-command>
        # e.g.: npm run lint -- --max-warnings 0
        run: echo "no-op — replace with actual lint command"

      - name: Test
        # Replace with: docker compose -f dev/docker-compose.yml run --rm --no-deps frontend <your-test-command>
        # e.g.: npm run test:coverage
        run: echo "no-op — replace with actual test command"

      # Uncomment and configure once tests produce a coverage file:
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     files: frontend/coverage/coverage-final.json   # adjust path
      #     flags: frontend
      #     fail_ci_if_error: false

  build-backend:
    name: Build & Push Backend
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: <dockerhub-org>/<project>-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: <dockerhub-org>/<project>-backend
          readme-filepath: ./README.md

  build-frontend:
    name: Build & Push Frontend
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: <dockerhub-org>/<project>-frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: <dockerhub-org>/<project>-frontend
          readme-filepath: ./README.md
